<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NeetCode Tracker Settings</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --border: #2a2a40;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 24px;
  }
  h1 { font-size: 17px; margin: 0 0 4px; }
  .sub { font-size: 13px; color: var(--muted); margin: 0 0 24px; line-height: 1.5; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; margin-top: 16px; }
  input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  input:focus { border-color: var(--green); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .hint a { color: var(--green); }
  button#saveBtn {
    margin-top: 22px;
    width: 100%;
    padding: 11px;
    background: var(--green);
    color: #0f0f1a;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  button#saveBtn:hover { opacity: 0.9; }
  #status {
    margin-top: 14px;
    font-size: 12px;
    text-align: center;
    min-height: 16px;
  }
  #status.ok { color: var(--green); }
  #status.err { color: var(--red); }
</style>
</head>
<body>
  <div class="card">
    <h1>⚙️ NeetCode Tracker Settings</h1>
    <p class="sub">Connect a GitHub repo to auto-commit your progress every time you solve a NeetCode 150 problem.</p>

    <label for="githubUser">GitHub username</label>
    <input id="githubUser" type="text" placeholder="e.g. octocat" autocomplete="off" />

    <label for="githubRepo">Repository name</label>
    <input id="githubRepo" type="text" placeholder="e.g. neetcode-progress" autocomplete="off" />

    <label for="githubToken">Personal access token</label>
    <input id="githubToken" type="password" placeholder="ghp_..." autocomplete="off" />
    <div class="hint">
      Needs <strong>repo</strong> scope (or fine-grained: Contents read/write on that repo).
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=NeetCode%20Tracker" target="_blank" rel="noopener">Create one →</a>
    </div>

    <button id="saveBtn">Save settings</button>
    <div id="status"></div>
  </div>

  <script src="src/options.js"></script>
</body>
</html>
